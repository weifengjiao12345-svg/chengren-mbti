<style>
/* ─── Reset & Base ─── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;background:#0f0f23;color:#fff;overflow-x:hidden}
button{border:none;background:none;cursor:pointer;font-family:inherit}
a{text-decoration:none;color:inherit}

/* ─── CSS 变量 ─── */
:root{
  --pink:#FF69B4;--purple:#DA70D6;--blue:#00BFFF;
  --bg:#0f0f23;--card:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.12);--muted:rgba(255,255,255,.5);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* ─── 页面切换 ─── */
.page{display:none;min-height:100vh;animation:fadeUp .4s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ─── 浮动背景气泡 ─── */
.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;border-radius:50%;filter:blur(70px);opacity:.45;animation:drift 10s ease-in-out infinite}
.b1{width:280px;height:280px;background:var(--pink);top:-60px;left:-80px;animation-delay:0s}
.b2{width:220px;height:220px;background:var(--purple);top:45%;right:-60px;animation-delay:-3s}
.b3{width:180px;height:180px;background:var(--blue);bottom:10%;left:15%;animation-delay:-6s}
@keyframes drift{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-28px) scale(1.08)}}

/* ─── 通用容器 ─── */
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 20px}

/* ══════════════════════════════
   首页
══════════════════════════════ */
#home{padding-bottom:calc(40px + var(--safe-bottom))}
.home-inner{display:flex;flex-direction:column;align-items:center;padding-top:80px;text-align:center}
.logo-box{
  width:100px;height:100px;border-radius:28px;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:48px;margin-bottom:28px;
  box-shadow:0 16px 48px rgba(255,105,180,.35);
  animation:pulse 2.4s ease-in-out infinite
}
@keyframes pulse{0%,100%{box-shadow:0 16px 48px rgba(255,105,180,.35)}50%{box-shadow:0 24px 64px rgba(255,105,180,.55)}}
.home-title{font-size:32px;font-weight:900;background:linear-gradient(90deg,var(--pink),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:10px}
.home-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:48px;padding:0 8px}
.cta{
  width:100%;max-width:320px;padding:18px 0;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  border-radius:50px;font-size:17px;font-weight:700;color:#fff;
  box-shadow:0 8px 32px rgba(255,105,180,.4);
  position:relative;overflow:hidden;transition:transform .15s
}
.cta:active{transform:scale(.97)}
.cta::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shine 2.8s infinite}
@keyframes shine{0%{left:-100%}100%{left:160%}}
.hot-tip{margin-top:24px;padding:10px 18px;background:rgba(255,255,255,.08);border-radius:20px;font-size:13px;color:var(--muted)}
.hot-tip em{color:var(--blue);font-style:normal;font-weight:600}
.home-from{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:20px;text-transform:uppercase}
.home-from-note{font-size:12px;color:rgba(255,255,255,.3);margin-top:20px}
.stat-row{display:flex;gap:24px;margin-top:36px}
.stat-item{text-align:center}
.stat-num{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}

/* ══════════════════════════════
   答题页
══════════════════════════════ */
#quiz{padding-bottom:calc(40px + var(--safe-bottom))}
.quiz-wrap{padding-top:24px}

/* 顶部进度 */
.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.back{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.progress-track{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--pink),var(--blue));border-radius:3px;transition:width .4s ease}
.q-count{font-size:13px;color:var(--muted);flex-shrink:0;min-width:36px;text-align:right}

/* 题目 */

.q-text{font-size:22px;font-weight:800;line-height:1.5;margin-bottom:32px;min-height:66px}

.opt:active{transform:scale(.98)}
.opt.selected{background:linear-gradient(135deg,rgba(255,105,180,.2),rgba(218,112,214,.2));border-color:var(--pink)}

.quiz-tip{text-align:center;font-size:11px;color:rgba(255,255,255,.25);margin-top:28px;letter-spacing:.5px}

/* ══════════════════════════════
   结果页
══════════════════════════════ */
#result{padding-bottom:calc(60px + var(--safe-bottom))}
.result-wrap{padding-top:32px}

/* 类型标题区 */
.res-type{font-size:64px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px}
.res-persona{font-size:26px;font-weight:800;margin-bottom:6px}
.res-analysis{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px}

/* 标签 */
.tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.tag{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(255,255,255,.08);color:var(--blue);border:1px solid rgba(0,191,255,.25)}

/* 人格图片 */
.persona-img{width:100%;max-width:320px;border-radius:20px;margin:0 auto 20px;display:block;box-shadow:0 8px 32px rgba(0,0,0,.4)}

/* 雷达图 */
.radar-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:20px;display:flex;flex-direction:column;align-items:center}
.radar-card canvas{width:220px;height:220px}

/* 商品推荐卡 */
.product-card{
  background:var(--card);border:1px solid var(--border);

.product-type-tip{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:10px}
.product-btn{
  display:block;width:100%;padding:15px 0;text-align:center;
  border-radius:50px;font-size:15px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  box-shadow:0 6px 24px rgba(255,105,180,.35);
  transition:transform .15s
}
.product-btn:active{transform:scale(.97)}
.smzdm-tag{font-size:11px;color:rgba(255,255,255,.3);text-align:center;margin-top:10px}
.product-text{font-size:14px;line-height:1.7;color:rgba(255,255,255,.85);margin-bottom:16px}
  display:block;width:100%;padding:15px 0;text-align:center;
  border-radius:50px;font-size:15px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  box-shadow:0 6px 24px rgba(255,105,180,.35);
  transition:transform .15s
}
.product-btn:active{transform:scale(.97)}

/* 分享区 */
.share-row{display:flex;gap:12px;margin-top:8px}
.share-btn{flex:1;padding:14px 0;border-radius:50px;font-size:14px;font-weight:600;text-align:center;transition:transform .15s}
.share-btn:active{transform:scale(.97)}
.btn-outline{background:rgba(255,255,255,.08);border:1.5px solid var(--border);color:#fff}
.btn-restart{background:rgba(255,255,255,.08);border:1.5px solid var(--border);color:var(--muted)}

/* 免责 */
.disclaimer{margin-top:32px;font-size:11px;color:rgba(255,255,255,.25);text-align:center;line-height:1.8}

/* 品牌标识 */
.brand-row{margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0}
.brand-logo{width:16px;height:16px;border-radius:4px;object-fit:contain}
.brand-text{font-size:11px;color:rgba(255,255,255,.35)}
.brand-text strong{color:rgba(255,255,255,.5);font-weight:600}
</style>

<!-- ══════ 逻辑层 ══════ -->
<script>
// ─── 状态 ───
let cur = 0;
const answers = [];

// ─── 工具 ───
function show(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }

// ─── 首页 ───
function startQuiz(){ cur=0; answers.length=0; renderQ(); show('quiz'); }
function goHome(){ show('home'); }
function restart(){ startQuiz(); }

// ─── 答题 ───
function renderQ(){
  const q = QUESTIONS[cur];
  const pct = (cur/QUESTIONS.length)*100;
  document.getElementById('pBar').style.width = pct+'%';
  document.getElementById('qCount').textContent = (cur+1)+'/'+QUESTIONS.length;
  document.getElementById('qNum').textContent = 'Q'+(cur+1<10?'0':'')+(cur+1);
  document.getElementById('qText').textContent = q.text;

  const html = q.options.map((o,i)=>
    `<button class="opt" onclick="pick(${i})">${o.text}</button>`
  ).join('');
  document.getElementById('opts').innerHTML = html;
}

function pick(i){
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o=>o.classList.remove('selected'));
  opts[i].classList.add('selected');
  if(navigator.vibrate) navigator.vibrate(20);

  answers.push(QUESTIONS[cur].options[i].value);

  setTimeout(()=>{
    cur++;
    if(cur < QUESTIONS.length){ renderQ(); }
    else { showResult(); }
  }, 280);
}

// ─── 结果 ───
function showResult(){
  const type = calcMBTI(answers);
  const p = PERSONALITIES[type] || PERSONALITIES['ENFP'];

  document.getElementById('rType').textContent = type;
  document.getElementById('rPersona').textContent = p.persona;
  document.getElementById('rAnalysis').textContent = p.analysis;
  document.getElementById('rProduct').textContent = p.product;
  document.getElementById('rLink').href = p.link;
  document.getElementById('rTags').innerHTML = p.tags.map(t=>`<span class="tag">#${t}</span>`).join('');
  // 显示人格图片
  const imgEl = document.getElementById('rImg');
  if(p.image){ imgEl.src=p.image; imgEl.style.display='block'; } else { imgEl.style.display='none'; }

  show('result');
  setTimeout(()=>drawRadar(p.radar, p.color), 100);
}

// ─── 雷达图 ───
function drawRadar(vals, accent){
  const canvas = document.getElementById('radarCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  canvas.width = 220*dpr; canvas.height = 220*dpr;
  ctx.scale(dpr,dpr);

  const cx=110, cy=110, R=80;
  const labels=['上头','理性','感官','灵魂'];
  const N=4;

  // 网格
  for(let r=1;r<=4;r++){
    ctx.beginPath();
    for(let i=0;i<N;i++){
      const a=(i/N)*Math.PI*2-Math.PI/2;
      const x=cx+R*(r/4)*Math.cos(a), y=cy+R*(r/4)*Math.sin(a);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,.1)';
    ctx.lineWidth=1; ctx.stroke();
  }
  // 轴线
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2-Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+R*Math.cos(a), cy+R*Math.sin(a));
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1; ctx.stroke();
  }
  // 数据面
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const a=(i/N)*Math.PI*2-Math.PI/2;
    const x=cx+R*v*Math.cos(a), y=cy+R*v*Math.sin(a);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle = hexAlpha(accent,.28);
  ctx.strokeStyle = accent;
  ctx.lineWidth=2; ctx.fill(); ctx.stroke();
  // 数据点
  vals.forEach((v,i)=>{
    const a=(i/N)*Math.PI*2-Math.PI/2;
    const x=cx+R*v*Math.cos(a), y=cy+R*v*Math.sin(a);
    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=accent; ctx.fill();
  });
  // 标签
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.font=`bold ${11*dpr/dpr}px sans-serif`;
  ctx.textAlign='center';
  labels.forEach((lb,i)=>{
    const a=(i/N)*Math.PI*2-Math.PI/2;
    const x=cx+(R+22)*Math.cos(a), y=cy+(R+22)*Math.sin(a)+4;
    ctx.fillText(lb,x,y);
  });
}

function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ─── 复制结果 ───
function copyResult(){
  const type = document.getElementById('rType').textContent;
  const persona = document.getElementById('rPersona').textContent;
  const analysis = document.getElementById('rAnalysis').textContent;
  const text = `我的关系人格是 ${type}「${persona}」\n${analysis}\n\n—— 来自「什么值得买」MBTI 人格测试，测完领专属好价\n快来测测你的 → ${location.href}`;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>toast('已复制，快去分享吧 🎉'));
  } else {
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('已复制，快去分享吧 🎉');
  }
}

// ─── Toast ───
function toast(msg){
  const el=document.createElement('div');
  el.textContent=msg;
  Object.assign(el.style,{
    position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',
    background:'rgba(0,0,0,.85)',color:'#fff',padding:'10px 20px',
    borderRadius:'24px',fontSize:'14px',zIndex:'9999',
    animation:'fadeUp .3s ease',whiteSpace:'nowrap'
  });
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}
</script>
